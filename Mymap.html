<!DOCTYPE html>
<html>
<head>
    <title>Modern Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Tùy chỉnh Zoom */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out { border-radius: 8px !important; margin-bottom: 2px !important; }

        /* Tùy chỉnh Marker */
        .custom-marker { background: #007AFF; border: 2px solid white; border-radius: 50%; }
        .custom-marker::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: #007AFF; animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }

        .leaflet-popup-content-wrapper { border-radius: 12px; font-family: sans-serif; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .leaflet-popup-tip-container { display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        
        var map = L.map('map', { zoomControl: false }).setView([35.945, 136.186], 15);

       
  　L.tileLayer('https://tiles.stadiamaps.com/tiles/osm_bright/{z}/{x}/{y}{r}.png', {
    attribution: '© Stadia Maps, © OpenStreetMap contributors'
}).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        var myIcon = L.divIcon({ className: 'custom-marker', iconSize: [12, 12] });
        L.marker([35.945, 136.186], {icon: myIcon})
            .addTo(map)
            .bindPopup("オーペンデータチームです。")
            .openPopup();
    </script>
</body>
</html>
