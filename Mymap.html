  "group": "history",
  "theme": "orange",
  "icon": "fa-solid fa-landmark",
  "desc": "中道通り沿いには、景観を意識した整備がなされており、おもむきある民家や蔵、塀等が一体となった景観となっており、どこか懐かしさを感じさせてくれます。",
  "hours": "",
  "img": "https://www.city.sabae.fukui.jp/ls/imagelarge/No56.jpg"
 }
];

        // Escape để nhét tên vào onclick an toàn (tránh vỡ chuỗi khi tên có ký tự đặc biệt)
        function escAttr(s) {
            return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function createLabelMarker(spot) {
            var markerHtml = `
                <div class="marker-container">
                    <div class="circle-icon bg-${spot.theme}">
                        <i class='${spot.icon}'></i>
                    </div>
                    <div class="marker-text text-${spot.theme}">${spot.name}</div>
                </div>
            `;
            var customIcon = L.divIcon({
                className: 'custom-icon-wrapper',
                html: markerHtml,
                iconSize: [200, 60],
                iconAnchor: [100, 30],
                popupAnchor: [0, -30]
            });

            var imgHtml = spot.img ? `<img src="${spot.img}" alt="${spot.name}" onerror="this.remove()">` : '';
            var hoursHtml = spot.hours ? `<div class="popup-hours">${spot.hours}</div>` : '';
            var safeName = escAttr(spot.name);
            var popupHtml = `
                <div class="custom-popup">
                    ${imgHtml}
                    <div class="popup-info">
                        <h4>${spot.name}</h4>
                        <p>${spot.desc || 'Đang cập nhật thông tin...'}</p>
                        ${hoursHtml}
                        <button class="nav-go-btn"
                            onclick="startNavigationTo(${spot.lat}, ${spot.lng}, '${safeName}')">
                            <i class="fa-solid fa-route"></i> ここへ行く / Chỉ đường
                        </button>
                    </div>
                </div>
            `;
            return L.marker([spot.lat, spot.lng], { icon: customIcon })
                    .bindPopup(popupHtml, { closeButton: false });
        }

        // Tạo layerGroup cho từng nhóm và đổ marker vào
        const layers = {};
        Object.keys(GROUPS).forEach(g => layers[g] = L.layerGroup());
        sabaeLocations.forEach(spot => {
            if (layers[spot.group]) createLabelMarker(spot).addTo(layers[spot.group]);
        });

        // Dựng panel lọc
        const panel = document.getElementById('filter-panel');
        Object.entries(GROUPS).forEach(([key, g]) => {
            const count = sabaeLocations.filter(s => s.group === key).length;
            if (count === 0) return;
            const chip = document.createElement('div');
            chip.className = 'filter-chip' + (g.defaultOn ? '' : ' off');
            chip.innerHTML = `<span class="dot bg-${g.theme}"><i class="${g.icon}"></i></span>${g.label}<span class="count">${count}</span>`;
            chip.onclick = () => {
                if (map.hasLayer(layers[key])) {
                    map.removeLayer(layers[key]);
                    chip.classList.add('off');
                } else {
                    layers[key].addTo(map);
                    chip.classList.remove('off');
                }
            };
            panel.appendChild(chip);
            if (g.defaultOn) layers[key].addTo(map);
        });

        // Thu gọn/mở panel khi click tiêu đề
        panel.querySelector('h3').style.cursor = 'pointer';
        panel.querySelector('h3').onclick = () => {
            panel.querySelectorAll('.filter-chip').forEach(c =>
                c.style.display = c.style.display === 'none' ? 'flex' : 'none'
            );
        };

        // Ẩn nhãn chữ khi zoom xa (< 15) để bản đồ không bị rối
        function updateLabels() {
            document.getElementById('map').classList.toggle('hide-labels', map.getZoom() < 15);
        }
        map.on('zoomend', updateLabels);
        updateLabels();

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // ====== NHÓM TAI NẠN GIAO THÔNG (bật/tắt trong panel) ======
        const accidentPoints = [
            [35.943611, 136.188500], [35.943444, 136.188417],
            [35.942972, 136.188472], [35.943389, 136.188056],
            [35.943556, 136.185917], [35.943722, 136.185028],
            [35.943861, 136.182639], [35.944472, 136.180250],
            [35.943917, 136.180250], [35.943806, 136.179778],
            [35.943833, 136.178639], [35.945361, 136.179694],
            [35.945583, 136.179833], [35.945889, 136.180028],
            [35.946667, 136.180500], [35.947583, 136.181111]
        ];

        // Tạo layer group để có thể bật/tắt cả cụm
        const accidentLayer = L.layerGroup();

        accidentPoints.forEach(function(p, i) {
            L.circleMarker(p, {
                radius: 7, color: '#c0392b', weight: 2,
                fillColor: '#e74c3c', fillOpacity: 0.75
            }).bindPopup(`<div class="custom-popup"><div class="popup-info">
                <h4>⚠️ 交通事故地点 ${i + 1}</h4>
                <p>事故が発生した場所 / Điểm xảy ra tai nạn</p>
                <button class="nav-go-btn"
                    onclick="startNavigationTo(${p[0]}, ${p[1]}, '交通事故地点 ${i + 1}')">
                    <i class="fa-solid fa-route"></i> ここへ行く / Chỉ đường
                </button>
            </div></div>`).addTo(accidentLayer);
        });

        accidentLayer.addTo(map); // mặc định hiện; đổi thành // để mặc định ẩn

        // --- Thêm chip「交通事故」vào panel lọc ---
        const accidentChip = document.createElement('div');
        accidentChip.className = 'filter-chip';
        accidentChip.innerHTML = `
            <span class="dot" style="background:#e74c3c;">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </span>
            <span>交通事故</span>
            <span class="count">${accidentPoints.length}</span>
        `;
        accidentChip.addEventListener('click', function() {
            if (map.hasLayer(accidentLayer)) {
                map.removeLayer(accidentLayer);
                accidentChip.classList.add('off');
            } else {
                accidentLayer.addTo(map);
                accidentChip.classList.remove('off');
            }
        });
        document.getElementById('filter-panel').appendChild(accidentChip);


        /* ═══════════════════════════════════════════════════════════════════
           ĐỘNG CƠ ĐIỀU HƯỚNG + GPS (ghép từ file "Leaflet GPS Navigation")
           Kích hoạt bằng nút「ここへ行く / Chỉ đường」trong popup.
           ═══════════════════════════════════════════════════════════════════ */

        // --- Cấu hình định tuyến ---
        // LƯU Ý: server OSRM demo công cộng (router.project-osrm.org) hiện chỉ
        // hỗ trợ hồ sơ "driving" (ô tô). Muốn đi bộ ("foot") ổn định cần dựng
        // server OSRM riêng. Để bản đồ luôn chạy được, mặc định để "driving".
        const OSRM_SERVICE = 'https://router.project-osrm.org/route/v1';
        const OSRM_PROFILE = 'driving';   // đổi 'foot' nếu bạn có server hỗ trợ đi bộ

        const OFF_ROUTE_THRESHOLD = 50;   // lệch quá 50m → tính lại đường
        const ARRIVAL_THRESHOLD   = 30;   // cách đích < 30m → đã đến nơi

        // --- Trạng thái điều hướng ---
        let userMarker = null, accuracyCircle = null;
        let routingControl = null, currentRoute = null;
        let watchId = null, isNavigating = false, firstFix = true, triedLowAccuracy = false;
        let navDestination = null, navDestName = '';

        // --- Marker vị trí hiện tại (chấm xanh giống Google Maps) ---
        const userIcon = L.divIcon({
            className: '',
            html: `<div style="width:18px;height:18px;background:#1a73e8;
                   border:3px solid white;border-radius:50%;
                   box-shadow:0 0 8px rgba(26,115,232,0.8);"></div>`,
            iconSize: [18, 18], iconAnchor: [9, 9]
        });

        // --- DOM (đặt tên riêng để KHÔNG đụng biến "panel" của filter) ---
        const navBanner  = document.getElementById('nav-banner');
        const navPanel   = document.getElementById('nav-panel');
        const navSummary = document.getElementById('nav-summary');
        const navSteps   = document.getElementById('nav-steps');

        // Helper: gắn cả 'click' (desktop) lẫn 'touchend' (iOS/Android),
        // chống double-fire bằng mốc thời gian. iOS thường không bắn 'click'
        // trên <div> thường nên bắt buộc phải lắng nghe 'touchend'.
        function bindTap(el, handler) {
            let last = 0;
            function run(e) {
                const now = Date.now();
                if (now - last < 400) return;   // bỏ qua click "ma" sau touchend
                last = now;
                handler(e);
            }
            el.addEventListener('touchend', run, { passive: true });
            el.addEventListener('click', run);
        }

        // Nút × đóng điều hướng
        bindTap(document.getElementById('nav-close'), function(e) {
            if (e.stopPropagation) e.stopPropagation();
            stopNavigation();
        });

        // Thu gọn / mở danh sách bước khi chạm header (trừ khi chạm nút ×)
        let stepsCollapsed = false;
        const navCaret = document.getElementById('nav-caret');
        bindTap(document.getElementById('nav-header'), function(e) {
            if (e.target && e.target.closest && e.target.closest('#nav-close')) return;
            stepsCollapsed = !stepsCollapsed;
            navSteps.style.display = stepsCollapsed ? 'none' : 'block';
            navCaret.className = stepsCollapsed
                ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-down';
            navCaret.style.fontSize = '11px';
            navCaret.style.color = '#3eb558';
        });

        function showBanner(text, cls) {
            navBanner.className = '';          // reset màu
            if (cls) navBanner.classList.add(cls);
            navBanner.textContent = text;
            navBanner.style.display = 'block';
        }

        // ═══ 1. BẮT ĐẦU ĐIỀU HƯỚNG TỚI 1 ĐIỂM (gọi từ nút trong popup) ═══
        window.startNavigationTo = function(lat, lng, name) {
            if (!('geolocation' in navigator)) {
                alert('Trình duyệt không hỗ trợ GPS / GPS 未対応です');
                return;
            }
            // Nếu đang dẫn đường tới điểm khác → dọn tuyến cũ trước
            if (isNavigating) resetRoute();

            navDestination = L.latLng(lat, lng);
            navDestName = name || '';
            isNavigating = true;
            firstFix = true;

            map.closePopup();
            showBanner('📍 GPSの位置を取得中... / Đang lấy vị trí...');
            navPanel.style.display = 'block';
            navSummary.textContent = navDestName + ' へ / đến đây';
            navSteps.innerHTML = '';

            triedLowAccuracy = false;
            beginWatch(true);   // thử độ chính xác cao trước
        };

        // Bắt đầu theo dõi GPS. timeout 30s + cho dùng vị trí cache (maximumAge)
        // để tránh lỗi timeout trên máy tính không có chip GPS thật.
        function beginWatch(highAccuracy) {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(
                onPositionUpdate, onPositionError,
                { enableHighAccuracy: highAccuracy, maximumAge: 30000, timeout: 30000 }
            );
        }

        // ═══ 2. MỖI LẦN GPS CẬP NHẬT ═══
        function onPositionUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            const currentPos = L.latLng(lat, lng);

            // Cập nhật marker vị trí + vòng độ chính xác
            if (!userMarker) {
                userMarker = L.marker(currentPos, { icon: userIcon }).addTo(map);
                accuracyCircle = L.circle(currentPos, {
                    radius: accuracy, color: '#1a73e8', fillOpacity: 0.1, weight: 1
                }).addTo(map);
            } else {
                userMarker.setLatLng(currentPos);
                accuracyCircle.setLatLng(currentPos).setRadius(accuracy);
            }

            // Camera bám theo vị trí: lần đầu zoom 17, sau đó chỉ pan (để user tự zoom)
            if (firstFix) {
                map.setView(currentPos, 17, { animate: true });
                firstFix = false;
            } else {
                map.panTo(currentPos, { animate: true });
            }

            // Lần đầu → tạo route; các lần sau → kiểm tra tiến độ
            if (!routingControl) createRoute(currentPos);
            else checkProgress(currentPos);
        }

        function onPositionError(err) {
            // Timeout (mã 3): thử lại 1 lần ở độ chính xác thấp — nhanh hơn,
            // hợp máy tính lấy vị trí qua Wi-Fi/IP thay vì GPS thật.
            if (err.code === 3 && !triedLowAccuracy) {
                triedLowAccuracy = true;
                showBanner('📡 Đang thử lại (độ chính xác thấp)... / 位置を再取得中...', 'reroute');
                beginWatch(false);
                return;
            }
            const messages = {
                1: 'Bạn chưa cấp quyền vị trí / 位置情報が拒否されました',
                2: 'Không lấy được tín hiệu GPS / GPS 取得失敗',
                3: 'GPS timeout — không lấy được vị trí / 位置情報がタイムアウトしました'
            };
            showBanner('⚠ ' + (messages[err.code] || err.message), 'error');
        }

        // ═══ 3. TẠO ROUTE TỪ VỊ TRÍ HIỆN TẠI ═══
        function createRoute(from) {
            routingControl = L.Routing.control({
                waypoints: [from, navDestination],
                router: L.Routing.osrmv1({ serviceUrl: OSRM_SERVICE, profile: OSRM_PROFILE }),
                lineOptions: { styles: [{ color: '#1a73e8', weight: 6, opacity: 0.8 }] },
                show: false,               // ẩn bảng mặc định của LRM, ta dùng panel riêng
                addWaypoints: false,
                fitSelectedRoutes: false,  // không zoom về toàn route, giữ camera theo GPS
                createMarker: () => null   // không tạo marker A/B mặc định
            }).addTo(map);

            routingControl.on('routesfound', (e) => {
                currentRoute = e.routes[0];
                populateSteps();
                showNextInstruction(0);
            });

            routingControl.on('routingerror', (e) => {
                console.error('Routing error:', e && e.error);
                showBanner('⚠ ルート検索に失敗しました / Không tìm được đường', 'error');
            });
        }

        // Đổ tóm tắt + danh sách bước vào nav-panel (tận dụng khung có sẵn)
        function populateSteps() {
            if (!currentRoute) return;
            const km  = (currentRoute.summary.totalDistance / 1000).toFixed(1);
            const min = Math.round(currentRoute.summary.totalTime / 60);
            navSummary.textContent = `${navDestName} まで ${km} km ・ 約 ${min} 分`;
            navSteps.innerHTML = '';
            currentRoute.instructions.forEach((inst) => {
                const li = document.createElement('li');
                const d = inst.distance ? ` (${Math.round(inst.distance)}m)` : '';
                li.textContent = inst.text + d;
                navSteps.appendChild(li);
            });
        }

        // ═══ 4. KIỂM TRA TIẾN ĐỘ + RE-ROUTE KHI LỆCH ĐƯỜNG ═══
        function checkProgress(currentPos) {
            if (!currentRoute) return;

            // Đã đến đích chưa?
            if (currentPos.distanceTo(navDestination) < ARRIVAL_THRESHOLD) {
                showBanner('🎉 目的地に到着しました / Bạn đã đến nơi!', 'arrive');
                // dừng theo dõi GPS nhưng giữ tuyến hiển thị vài giây
                if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
                isNavigating = false;
                return;
            }

            // Tìm điểm gần nhất trên route để biết có lệch đường không
            const coords = currentRoute.coordinates;
            let minDist = Infinity, nearestIndex = 0;
            for (let i = 0; i < coords.length; i++) {
                const d = currentPos.distanceTo(coords[i]);
                if (d < minDist) { minDist = d; nearestIndex = i; }
            }

            if (minDist > OFF_ROUTE_THRESHOLD) {
                // Lệch đường → tính lại từ vị trí hiện tại
                showBanner('🔄 ルート再検索中... / Đang tính lại đường...', 'reroute');
                routingControl.setWaypoints([currentPos, navDestination]);
            } else {
                // Vẫn trên đường → hiện chỉ dẫn tiếp theo
                updateInstruction(nearestIndex, currentPos);
            }
        }

        // ═══ 5. HIỂN THỊ CHỈ DẪN TIẾP THEO ═══
        function updateInstruction(nearestCoordIndex, currentPos) {
            const instructions = currentRoute.instructions;
            for (let i = 0; i < instructions.length; i++) {
                if (instructions[i].index >= nearestCoordIndex) {
                    const inst = instructions[i];
                    const distToTurn = Math.round(
                        currentPos.distanceTo(currentRoute.coordinates[inst.index])
                    );
                    showBanner(`${distToTurn}m — ${inst.text}`);
                    return;
                }
            }
        }

        function showNextInstruction(i) {
            if (currentRoute && currentRoute.instructions[i]) {
                showBanner(currentRoute.instructions[i].text);
            }
        }

        // Xoá tuyến + reset (dùng khi bắt đầu tuyến mới)
        function resetRoute() {
            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            currentRoute = null;
        }

        // ═══ DỪNG ĐIỀU HƯỚNG (nút × trên nav-panel) ═══
        function stopNavigation() {
            isNavigating = false;
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            resetRoute();
            navBanner.style.display = 'none';
            navPanel.style.display = 'none';
            // Giữ lại chấm vị trí "bạn đang ở đây"; bỏ 2 dòng dưới nếu muốn xoá luôn
            // if (userMarker)    { map.removeLayer(userMarker);    userMarker = null; }
            // if (accuracyCircle){ map.removeLayer(accuracyCircle); accuracyCircle = null; }
        }
    </script>
</body>
</html>
